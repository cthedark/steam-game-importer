name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: node20-linux-x64
            artifact: steam-game-importer-linux-x64
          - target: node20-linux-arm64
            artifact: steam-game-importer-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Bundle for pkg
        run: node scripts/bundle.mjs

      - name: Package binary
        run: npx pkg bundle/index.cjs --targets ${{ matrix.target }} --output release/${{ matrix.artifact }} --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/steam-game-importer-linux-x64/steam-game-importer-linux-x64
            artifacts/steam-game-importer-linux-arm64/steam-game-importer-linux-arm64
